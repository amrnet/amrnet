version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --all-extras --group docs
    install:
      - "true"
    pre_build:
      - |
        if [ -n "$READTHEDOCS_LANGUAGE" ] && [ "$READTHEDOCS_LANGUAGE" != "en" ]; then
          cd docs && find "locale/$READTHEDOCS_LANGUAGE" -name '*.po' -exec msgfmt {} -o {}.mo \; || true
        fi

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - pdf
  - htmlzip
